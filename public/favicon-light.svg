<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#E8EAEF"/>
    </linearGradient>
    <linearGradient id="accentL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D9373"/>
      <stop offset="100%" stop-color="#0B8366"/>
    </linearGradient>
    <filter id="glowL">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bgL)"/>
  <rect x="2" y="2" width="508" height="508" rx="94" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="3"/>

  <!-- Terminal prompt watermark -->
  <text
    x="76"
    y="340"
    font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace"
    font-weight="600"
    font-size="92"
    fill="rgba(13,147,115,0.15)"
    letter-spacing="-2"
  >&gt;_</text>

  <!-- CS monogram -->
  <text
    x="256"
    y="336"
    text-anchor="middle"
    font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', 'Courier New', monospace"
    font-weight="700"
    font-size="240"
    fill="url(#accentL)"
    filter="url(#glowL)"
    letter-spacing="-12"
  >CS</text>

  <!-- Cursor -->
  <rect x="390" y="140" width="4" height="220" rx="2" fill="#0D9373" opacity="0.45"/>
</svg>
